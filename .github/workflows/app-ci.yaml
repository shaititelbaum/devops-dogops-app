name: DogOps CI CD Pipeline

on:
  push:
    branches:
      - "master"
      - "feature/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "master"

# ==========================================
# 🚀 CI/CD PIPELINE (GITHUB ACTIONS)
# ==========================================
# This workflow is triggered on pushes and PRs. It performs code linting,
# builds the backend and frontend Docker images, pushes them to AWS ECR,
# and automatically updates the GitOps repository for continuous deployment.
jobs:
  # Backend build and deploy pipeline
  build-and-test:
    name: Backend Verify
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Code Lint
      run: |
        pylint --errors-only .

    - name: Deploy to ECR and GitOps
      uses: ./.github/actions/deploy-ecr-gitops
      with:
        app_name: "backend"
        docker_path: "."
        aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        gitops_token: ${{ secrets.GITOPS_REPO_TOKEN }}

  # Frontend build and deploy pipeline
  build-and-push-frontend:
    name: Frontend Verify
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Deploy to ECR and GitOps
      uses: ./.github/actions/deploy-ecr-gitops
      with:
        app_name: "frontend"
        docker_path: "./frontend"
        aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        gitops_token: ${{ secrets.GITOPS_REPO_TOKEN }}