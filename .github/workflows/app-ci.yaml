name: DogOps CI CD Pipeline

on:
  push:
    branches:
      - "master"
      - "feature/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "master"

jobs:
  # Backend build and deploy pipeline
  build-and-test:
    name: Backend Verify
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Code Lint
      run: |
        pylint --errors-only .

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: devops-dogops-backend
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          IMAGE_TAG="${{ github.ref_name }}"
        elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
          IMAGE_TAG="staging-${{ github.sha }}"
        else
          IMAGE_TAG="test-${{ github.sha }}"
        fi
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

    # האוטומציה המשולשת שמנתבת לבד לתיקייה הנכונה ב-GitOps
    - name: Update Backend Tag in GitOps Repo
      env:
        GITOPS_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        IMAGE_TAG: ${{ steps.build-backend.outputs.image_tag }}
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          ENV_DIR="prod"
        elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
          ENV_DIR="staging"
        else
          ENV_DIR="test"
        fi
        
        git clone https://x-access-token:${GITOPS_TOKEN}@github.com/shaititelbaum/devops-dogops-gitops.git gitops-repo
        cd gitops-repo
        
        # 👇 התיקון: שימוש ב-yq ושינוי נתיב הקובץ
        yq -i ".backend.imageTag = \"$IMAGE_TAG\"" environments/values-$ENV_DIR.yaml
        
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add environments/values-$ENV_DIR.yaml
        git commit -m "chore(deploy): auto-update backend to $IMAGE_TAG in $ENV_DIR [skip ci]" || echo "No changes"
        git pull --rebase origin master
        git push origin master

  # Frontend build and deploy pipeline
  build-and-push-frontend:
    name: Frontend Verify
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: devops-dogops-frontend
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          IMAGE_TAG="${{ github.ref_name }}"
        elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
          IMAGE_TAG="staging-${{ github.sha }}"
        else
          IMAGE_TAG="test-${{ github.sha }}"
        fi
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

    # האוטומציה המשולשת עבור ה-Frontend
    - name: Update Frontend Tag in GitOps Repo
      env:
        GITOPS_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        IMAGE_TAG: ${{ steps.build-frontend.outputs.image_tag }}
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          ENV_DIR="prod"
        elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
          ENV_DIR="staging"
        else
          ENV_DIR="test"
        fi
        
        git clone https://x-access-token:${GITOPS_TOKEN}@github.com/shaititelbaum/devops-dogops-gitops.git gitops-repo
        cd gitops-repo
        
        # 👇 התיקון: שימוש ב-yq לעדכון הבלוק של ה-frontend בלבד
        yq -i ".frontend.imageTag = \"$IMAGE_TAG\"" environments/values-$ENV_DIR.yaml
        
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add environments/values-$ENV_DIR.yaml
        git commit -m "chore(deploy): auto-update frontend to $IMAGE_TAG in $ENV_DIR [skip ci]" || echo "No changes"
        git pull --rebase origin master
        git push origin master