<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogOps - עתיד האילוף </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="clicker-audio" src="./assets/dog-clicker.mp3" preload="auto"></audio>
    <audio id="oops-audio" src="./assets/oops.mp3" preload="auto"></audio>

    <div class="todo-container" id="main-container">
        <h1>
            <span class="emoji-paw">🐾</span>
            DogOps Dashboard
        </h1>
        <p class="subtitle">יומן מעקב התנהגות ואילוף בשטח</p>

        <div class="nav-menu">
            <button id="tab-dashboard" class="nav-item active" onclick="switchView('dashboard')">📋 לוח דיווח</button>
            <button id="tab-mydog" class="nav-item" onclick="switchView('mydog')">🐕 הכלב שלי</button>
            <button id="tab-history" class="nav-item" onclick="switchView('history')">📜 היסטוריה</button>
            <button id="tab-vaccines" class="nav-item" onclick="switchView('vaccines')">💉 פנקס רפואי</button>
            <button id="tab-ai" class="nav-item" onclick="switchView('ai')">🤖 עוזר AI</button>
        </div>
        
        <div id="input-section">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="מה הכלב עשה עכשיו? (למשל: משך ברצועה...)">
            </div>

            <div class="quick-actions-wrapper">
                <select id="quick-events-select" onchange="handleQuickEventSelect()">
                    <option value="" disabled selected>⚡ דיווח מהיר (נטען...)</option>
                </select>

                <div id="quick-event-inline-add" class="hidden quick-inline-ui">
                    <select id="new-quick-event-type" class="quick-type-select">
                        <option value="good">🟢</option>
                        <option value="oops">🔴</option>
                    </select>
                    <input type="text" id="new-quick-event-input" placeholder="למשל: תקף את השואב אבק...">
                    <button class="save-btn" onclick="saveInlineQuickEvent()">שמור</button>
                    <button class="cancel-btn" onclick="cancelInlineQuickEvent()">ביטול</button>
                </div>

                <div id="quick-event-manage-ui" class="hidden quick-inline-ui manage-ui-container">
                    <div style="font-size: 13px; margin-bottom: 12px; color: #bae6fd; font-weight: bold;">🛠️ ערוך או מחק דיווחים:</div>
                    <div id="manage-events-list"></div>
                    <button onclick="closeManageEvents()" class="cancel-btn" style="margin-top: 10px; width: 100%;">סגור ניהול</button>
                </div>
            </div>

            <div class="advanced-inputs">
                <div class="input-subgroup">
                    <label for="todo-priority">🎯 חשיבות לעבודה:</label>
                    <select id="todo-priority">
                        <option value="קל">קל</option>
                        <option value="בינוני" selected>בינוני</option>
                        <option value="חשוב">חשוב 🚨</option>
                    </select>
                </div>
                <div class="input-subgroup">
                    <label for="todo-duedate">📅 תאריך יעד:</label>
                    <input type="date" id="todo-duedate">
                </div>
                
                <div class="input-subgroup full-width">
                    <label for="todo-location">📍 מיקום האירוע (ושמירת מפה):</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="todo-location" class="location-input" placeholder="איפה זה קרה? (למשל: פארק...)" style="flex: 1;">
                        <button type="button" id="gps-btn" class="gps-btn" onclick="fetchGPS()" title="משוך מיקום נוכחי מלוויין">🛰️ צרף מיקום</button>
                    </div>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-good" onclick="addDogEvent('good')">🟢 כלב טוב !</button>
                <button class="btn-oops" onclick="addDogEvent('oops')">🔴 אופס...</button>
            </div>
        </div>

        <div id="mydog-section">
            <div id="profile-pic-wrapper" class="profile-pic-container" onclick="document.getElementById('dog-pic-input').click()" title="לחץ להחלפת תמונה">
                <img id="dog-profile-pic" src="" alt="">
                <div id="dog-pic-placeholder" class="pic-placeholder">🐕</div>
                <div class="profile-pic-overlay">📷 עדכן תמונה</div>
                <input type="file" id="dog-pic-input" accept="image/*" onchange="handleImageUpload(event)" hidden>
            </div>

           <div class="dog-details-card">
                <div class="input-subgroup full-width">
                    <label>שם הכלב/ה:</label>
                    <input type="text" id="dog-name" placeholder="למשל: ג'וי">
                </div>
                
                <div class="input-subgroup full-width">
                    <label>גזע:</label>
                    <input type="text" id="dog-breed" placeholder="למשל: גולדן רטריבר">
                </div>
                
                <div class="input-subgroup full-width">
                    <label>גיל נוכחי:</label>
                    <input type="text" id="dog-age" placeholder="יחושב אוטומטית לפי תאריך הלידה..." disabled>
                </div>
                
                <div class="input-subgroup full-width">
                    <label>תאריך לידה:</label>
                    <input type="date" id="dog-dob" onchange="calculateDogAge()">
                </div>
                
                <div class="input-subgroup full-width">
                    <label>מין:</label>
                    <select id="dog-gender">
                        <option value="זכר">זכר</option>
                        <option value="נקבה">נקבה</option>
                    </select>
                </div>
                
                <div class="input-subgroup full-width">
                    <label>סטטוס רפואי:</label>
                    <select id="dog-status">
                        <option value="מסורס">מסורס</option>
                        <option value="לא מסורס">לא מסורס</option>
                        <option value="מעוקרת">מעוקרת</option>
                        <option value="לא מעוקרת">לא מעוקרת</option> 
                    </select>
                </div>
                
                <div class="input-subgroup full-width">
                    <label>משקל (בק"ג):</label>
                    <input type="number" id="dog-weight" placeholder="למשל: 30" step="0.1">
                </div>

                <div class="input-subgroup full-width">
                    <label>מספר שבב:</label>
                    <input type="text" id="dog-chip" placeholder="למשל: 981020000000000">
                </div>

                <div class="input-subgroup full-width">
                    <label>אלרגיות / הערות מיוחדות:</label>
                    <input type="text" id="dog-allergies" placeholder="למשל: רגישות לעוף, אלרגיה לפרעושים...">
                </div>
                
                <div class="profile-actions">
                    <button id="btn-edit-profile" class="btn-edit-profile hidden" onclick="enableProfileEdit()">✏️ ערוך פרטים</button>
                    <button id="btn-save-profile" class="btn-save-profile" onclick="saveDogProfile()">💾 שמור פרטים</button>
                </div>
            </div> 
        </div>

        <div id="history-section" style="display: none;">
            <div class="filter-group">
                <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">הכל</button>
                <button class="filter-btn" id="filter-good" onclick="setFilter('good')">🟢 כלב טוב</button>
                <button class="filter-btn" id="filter-oops" onclick="setFilter('oops')">🔴 אופס</button>
            </div>
            <div id="todo-list-container"></div>
        </div>

        <div id="vaccine-section">
            <button class="btn-toggle-form" onclick="toggleVaccineForm()">➕ הוסף תיעוד רפואי חדש</button>
            <div id="vaccine-form" class="vaccine-add-form">
                <div class="advanced-inputs" style="margin-bottom: 0; background: transparent; border: none; padding: 0;">
                    <div class="input-subgroup full-width">
                        <label>סוג החיסון/טיפול:</label>
                        <select id="vac-type" onchange="handleVaccineTypeChange()"> 
                            <option value="משושה">💉 חיסון משושה</option>
                            <option value="כלבת">🚨 חיסון כלבת</option>
                            <option value="תולעת הפארק">🐛 תולעת הפארק (ספירוצירקה)</option>
                            <option value="שעלת">🤧 חיסון שעלת</option>
                            <option value="תילוע ופרעושים">💊 כדור תילוע / אמפולה</option>
                            <option value="other">📝 אחר...</option> 
                        </select>
                        <input type="text" id="vac-type-other" class="dynamic-text-input hidden" placeholder="הקלידו סוג טיפול">
                    </div>
                    <div class="input-subgroup">
                        <label>תאריך ביצוע:</label>
                        <input type="date" id="vac-given-date">
                    </div>
                    <div class="input-subgroup">
                        <label>תוקף עד (אופציונלי):</label>
                        <input type="date" id="vac-expiry-date" placeholder="למשל עוד שנה">
                    </div>
                </div>
                <button class="btn-submit-vaccine" onclick="addVaccine()">שמור טיפול</button>
            </div>
            <div id="vaccine-list-container"></div>
        </div>

        <div id="ai-section">
            <div class="quick-actions-wrapper">
                <select id="ai-quick-prompts-select" onchange="handleAiQuickPromptSelect()">
                    <option value="" disabled selected>⚡ שאלות מהירות למאלף (נטען...)</option>
                </select>

                <div id="ai-quick-prompt-inline-add" class="hidden quick-inline-ui">
                    <input type="text" id="new-ai-quick-prompt-input" placeholder="למשל: איך ללמד את הכלב 'ארצה'?">
                    <button class="save-btn" onclick="saveInlineAiQuickPrompt()">שמור</button>
                    <button class="cancel-btn" onclick="cancelInlineAiQuickPrompt()">ביטול</button>
                </div>

                <div id="ai-quick-prompt-manage-ui" class="hidden quick-inline-ui manage-ui-container">
                    <div style="font-size: 13px; margin-bottom: 12px; color: #bae6fd; font-weight: bold;">🛠️ ערוך או מחק שאלות נפוצות:</div>
                    <div id="manage-ai-prompts-list"></div>
                    <button onclick="closeManageAiPrompts()" class="cancel-btn" style="margin-top: 10px; width: 100%;">סגור ניהול</button>
                </div>
            </div> 
            
            <div id="ai-chat-container">
                <div class="ai-message bot">היי! אני המאלף הווירטואלי שלכם 🐾<br>אפשר לשאול אותי שאלות, להתייעץ על התנהגות, או לבקש ממני לנתח את ההיסטוריה שתיעדת!</div>
            </div>
            <div id="ai-typing-indicator" class="ai-typing">המאלף חושב...</div>
            
            <div class="ai-input-wrapper">
                <input type="text" id="ai-input" placeholder="שאל אותי על אילוף..." onkeypress="handleAiKeyPress(event)">
                <button onclick="handleAiSubmit()" title="שלח">🐾</button>
            </div>
        </div>

    </div>

    <script>
        const API_URL = '/api/todos';
        const VACCINES_API_URL = '/api/vaccines';
        const clickerSound = document.getElementById('clicker-audio');
        const oopsSound = document.getElementById('oops-audio');
        
        let currentFilter = 'all';
        let currentView = 'dashboard';
        let editingTodoId = null;
        let currentGpsLink = null; 

        // קריאה ראשונית לטעינת פרטי הכלב
       // קריאה ראשונית לטעינת נתונים עם עליית הדף
        // קריאה ראשונית לטעינת נתונים עם עליית הדף
        document.addEventListener('DOMContentLoaded', () => {
            loadDogProfile();
            initQuickEvents(); // <--- שינינו את השם של הפונקציה כאן
            initAiQuickPrompts();
        }); 

        function switchView(viewName) {
            currentView = viewName;
            const container = document.getElementById('main-container');
            
            const sectionMap = {
                'dashboard': 'input-section',
                'mydog': 'mydog-section',
                'history': 'history-section',
                'vaccines': 'vaccine-section',
                'ai': 'ai-section'
            };

            const sections = ['input-section', 'mydog-section', 'history-section', 'vaccine-section', 'ai-section'];
            
            // מציגים רק את האזור הנבחר
            sections.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.style.display = (id === sectionMap[viewName]) ? 'flex' : 'none';
                    if (id === 'input-section' && viewName === 'dashboard') el.style.display = 'block';
                }
            }); 
            
            // ניהול ה-active בתפריט
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${viewName}`);
            if (activeTab) activeTab.classList.add('active');

            // הוספה והסרה של wide-mode בשביל אנימציית ההתרחבות 
            if (viewName === 'dashboard') {
                container.classList.remove('wide-mode');
            } else {
                container.classList.add('wide-mode');
            }

            // משיכת נתונים מהשרת
            if (viewName === 'history') fetchTodos();
            if (viewName === 'vaccines') fetchVaccines();
        }

        function setFilter(filterValue) {
            currentFilter = filterValue;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (filterValue === 'all') document.getElementById('filter-all').classList.add('active');
            if (filterValue === 'good') document.getElementById('filter-good').classList.add('active');
            if (filterValue === 'oops') document.getElementById('filter-oops').classList.add('active');
            fetchTodos();
        }

        // ==========================================
        // לוגיקת AI (חיבור אמיתי לפייתון)
        // ==========================================
        function handleAiKeyPress(event) {
            if (event.key === 'Enter') handleAiSubmit();
        }

        function handleAiSubmit() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if (text) {
                submitAiMessage(text);
                input.value = '';
            }
        }

        async function submitAiMessage(text) {
            const chatContainer = document.getElementById('ai-chat-container');
            const typingIndicator = document.getElementById('ai-typing-indicator');
            
            // הוספת הודעת המשתמש
            const userMsg = document.createElement('div');
            userMsg.className = 'ai-message user';
            userMsg.innerText = text;
            chatContainer.appendChild(userMsg);
            
            // גלילה למטה
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // הצגת "מקליד..."
            typingIndicator.style.display = 'block';
            
            try {
                // קריאה אמיתית לשרת הפייתון שלנו
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // הסתרת אנימציית ההקלדה
                typingIndicator.style.display = 'none';
                
                // יצירת הודעת התשובה
                const botMsg = document.createElement('div');
                botMsg.className = 'ai-message bot';
                
                if (response.ok) {
                    botMsg.innerText = data.response;
                } else {
                    botMsg.innerHTML = "🤖 שגיאה מהשרת:<br>" + (data.response || data.error);
                }
                
                chatContainer.appendChild(botMsg);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
            } catch (error) {
                typingIndicator.style.display = 'none';
                const errorMsg = document.createElement('div');
                errorMsg.className = 'ai-message bot';
                errorMsg.innerText = "🤖 אופס... לא הצלחתי ליצור קשר עם השרת.";
                chatContainer.appendChild(errorMsg);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // ==========================================
        // לוגיקת החיסונים
        // ==========================================
        // משיכת רשימת החיסונים מהשרת
        async function fetchVaccines() {
            try {
                const response = await fetch(VACCINES_API_URL);
                if (!response.ok) throw new Error('API failed');
                const vaccines = await response.json();
                renderVaccines(vaccines);
            } catch (error) {
                console.error("Error fetching vaccines:", error);
            }
        }
        
        function toggleVaccineForm() {
            const form = document.getElementById('vaccine-form');
            form.classList.toggle('active');
            if(form.classList.contains('active')) {
                document.getElementById('vac-given-date').value = new Date().toISOString().split('T')[0];
            }
        }

        function handleVaccineTypeChange() {
            const select = document.getElementById('vac-type');
            const otherInput = document.getElementById('vac-type-other');
            if (select.value === 'other') {
                otherInput.classList.remove('hidden');
            } else {
                otherInput.classList.add('hidden');
                otherInput.value = '';
            }
        }

       async function addVaccine() {
            // שמנו let במקום const כדי שנוכל לשנות את הערך
            let type = document.getElementById('vac-type').value;

            // --- התוספת שלנו עבור בחירת "אחר" ---
            if (type === 'other') {
                type = document.getElementById('vac-type-other').value.trim();
                if (!type) {
                    alert("חובה להקליד את סוג הטיפול!");
                    return;
                }
            }
            // ------------------------------------

            const givenDate = document.getElementById('vac-given-date').value;
            const expiryDate = document.getElementById('vac-expiry-date').value;

            if (!givenDate) {
                alert("חובה להזין תאריך ביצוע!");
                return;
            }

            const payload = { type: type, given_date: givenDate, expiry_date: expiryDate || null };

            try {
                const response = await fetch(VACCINES_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    toggleVaccineForm(); 
                    document.getElementById('vac-expiry-date').value = ""; 
                    fetchVaccines(); 
                }
            } catch (error) {
                console.error("Failed to save vaccine", error);
            }
        } 

        async function deleteVaccine(id) {
            if(!confirm("למחוק תיעוד זה?")) return;
            try {
                await fetch(`${VACCINES_API_URL}/${id}`, { method: 'DELETE' });
                fetchVaccines();
            } catch (e) { console.error(e); }
        }

        function getStatusBadgeHtml(expiryDateStr) {
            if (!expiryDateStr) return '';
            
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const expDate = new Date(expiryDateStr);
            expDate.setHours(0,0,0,0);
            
            const diffTime = expDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return `<span class="status-badge status-expired">❌ פג תוקף! סכנה!</span>`;
            else if (diffDays <= 30) return `<span class="status-badge status-warning">⚠️ לפקוח עין: נותרו ${diffDays} ימים</span>`;
            else return `<span class="status-badge status-valid">✅ בתוקף</span>`;
        }

        function renderVaccines(vaccines) {
            const container = document.getElementById('vaccine-list-container');
            container.innerHTML = '';
            vaccines.sort((a, b) => new Date(b.given_date) - new Date(a.given_date));

            vaccines.forEach(vac => {
                const givenStr = new Date(vac.given_date).toLocaleDateString('he-IL');
                const expiryStr = vac.expiry_date ? new Date(vac.expiry_date).toLocaleDateString('he-IL') : 'לא צוין';
                const statusBadge = getStatusBadgeHtml(vac.expiry_date);

                const div = document.createElement('div');
                div.className = 'vaccine-card';
                div.innerHTML = `
                    <div class="vaccine-info">
                        <span class="vaccine-type">${vac.type}</span>
                        <span class="vaccine-dates">📅 ניתן ב: ${givenStr} | ⏳ תוקף עד: ${expiryStr}</span>
                        <div>${statusBadge}</div>
                    </div>
                    <div class="actions-wrapper">
                        <button class="delete-btn" onclick="deleteVaccine(${vac.id})">מחק</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ==========================================
        // לוגיקת הדיווח וההיסטוריה
        // ==========================================
        async function fetchTodos() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API failed');
                const todos = await response.json();
                renderTodos(todos);
            } catch (error) {
                console.log("Using local offline mode (no DB connected).");
            }
        }

        function fetchGPS() {
            const btn = document.getElementById('gps-btn');
            btn.innerText = '⏳ מתביית...';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        currentGpsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                        btn.innerText = '✅ נשמר!';
                        btn.classList.add('success');
                    },
                    (error) => {
                        console.error("GPS Error: ", error);
                        btn.innerText = '❌ נכשל';
                        alert('לא הצלחנו למשוך מיקום.');
                    }
                );
            }
        }

async function addDogEvent(type) {
            if (type === 'good' && clickerSound) {
                clickerSound.currentTime = 0;
                clickerSound.play().catch(e=>{});
            } else if (type === 'oops' && oopsSound) {
                oopsSound.currentTime = 0;
                oopsSound.play().catch(e=>{});
            }

            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (text === "") return;

            const fullTitle = (type === 'good' ? '🟢 ' : '🔴 ') + text;
            const priorityVal = (type === 'oops') ? document.getElementById('todo-priority').value : null;
            const dueDateVal = (type === 'oops') ? document.getElementById('todo-duedate').value : null;
            const locationVal = document.getElementById('todo-location').value.trim() || null;

            const payload = { 
                title: fullTitle, 
                priority: priorityVal, 
                due_date: dueDateVal, 
                location: locationVal,
                gps_link: currentGpsLink
            };

            const resetGpsUI = () => {
                currentGpsLink = null;
                const btn = document.getElementById('gps-btn');
                btn.innerText = '🛰️ צרף מיקום';
                btn.classList.remove('success');
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('API failed');
                
                input.value = "";
                document.getElementById('todo-location').value = "";
                resetGpsUI();
                
                // התראה קטנה ונעימה שהדיווח עבד!
                alert("הדיווח נשמר בהצלחה בהיסטוריה!"); 
                
            } catch (error) {
                console.error("Error adding event", error);
            }
        }

        function renderTodos(todos) {
            const container = document.getElementById('todo-list-container');
            container.innerHTML = '';

            let filteredTodos = todos;
            if (currentFilter === 'good') filteredTodos = todos.filter(t => !t.title.startsWith('🔴'));
            else if (currentFilter === 'oops') filteredTodos = todos.filter(t => t.title.startsWith('🔴'));

            filteredTodos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let currentDay = '';
            let currentUl = null;

            filteredTodos.forEach(todo => {
                const dateObj = new Date(todo.created_at);
                const dateStr = dateObj.toLocaleDateString('he-IL');
                const timeStr = dateObj.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });

                if (dateStr !== currentDay) {
                    currentDay = dateStr;
                    const dayHeader = document.createElement('div');
                    dayHeader.classList.add('day-header');
                    const todayStr = new Date().toLocaleDateString('he-IL');
                    dayHeader.innerText = dateStr === todayStr ? 'היום - ' + dateStr : dateStr;
                    container.appendChild(dayHeader);
                    currentUl = document.createElement('ul');
                    container.appendChild(currentUl);
                }

                const li = document.createElement('li');
                const isOops = todo.title.startsWith('🔴');
                li.classList.add(isOops ? 'status-oops' : 'status-good');
                
                let metaHtml = `<div class="meta-wrapper">`;
                if (todo.location) metaHtml += `<span class="badge-location">📍 ${todo.location}</span>`;
                if (todo.gps_link) metaHtml += `<a href="${todo.gps_link}" target="_blank" class="badge-map">🗺️ נווט במפה</a>`;
                if (isOops) {
                    if (todo.priority) metaHtml += `<span class="badge-priority">🔥 ${todo.priority}</span>`;
                    if (todo.due_date) metaHtml += `<span class="badge-date">📅 יעד: ${new Date(todo.due_date).toLocaleDateString('he-IL')}</span>`;
                }
                metaHtml += `</div>`;

                li.innerHTML = `
                    <div class="todo-content-wrapper">
                        <span>${todo.title}</span>
                        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                            <span class="time-stamp">${timeStr}</span>
                            ${metaHtml}
                        </div>
                    </div>
                `;
                if (currentUl) currentUl.appendChild(li);
            });
        }

        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('todo-duedate').value = tomorrow.toISOString().split('T')[0];

        // ==========================================
        // לוגיקת "הכלב שלי" (פרופיל ותמונה)
        // ==========================================
        
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgElement = document.getElementById('dog-profile-pic');
                imgElement.src = e.target.result;
                imgElement.style.display = 'block';
                document.getElementById('dog-pic-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
        
        // פונקציה חכמה לחישוב גיל מדויק בשנים וחודשים
        function calculateDogAge() {
            const dobString = document.getElementById('dog-dob').value;
            const ageInput = document.getElementById('dog-age');
            
            if (!dobString) {
                ageInput.value = '';
                return;
            }
            
            const birthDate = new Date(dobString);
            const today = new Date();
            
            // חישוב סך הכל החודשים שעברו
            let totalMonths = (today.getFullYear() - birthDate.getFullYear()) * 12 + (today.getMonth() - birthDate.getMonth());
            
            // תיקון קטן: אם עדיין לא הגענו ליום בחודש שבו הוא נולד, נוריד חודש אחד
            if (today.getDate() < birthDate.getDate()) {
                totalMonths--;
            }
            
            if (totalMonths < 0) {
                ageInput.value = 'טרם נולד 🐾';
                return;
            }
            
            const years = Math.floor(totalMonths / 12);
            const months = totalMonths % 12;
            
            let ageText = '';
            if (years > 0) ageText += `${years} שנים`;
            if (years > 0 && months > 0) ageText += ` ו-`;
            if (months > 0) ageText += `${months} חודשים`;
            if (years === 0 && months === 0) ageText = 'גור קטנטן!';
            
            ageInput.value = ageText;
        }

        // פונקציית הקסם: שולטת האם אפשר לערוך או לא
        // פונקציית הקסם: שולטת האם אפשר לערוך או לא
        function setProfileState(isEditing) {
            // רשימת כל השדות (מעודכן עם השדות החדשים)
            const inputs = ['dog-name', 'dog-breed', 'dog-dob', 'dog-gender', 'dog-status', 'dog-weight', 'dog-chip', 'dog-allergies'];
            inputs.forEach(id => {
                document.getElementById(id).disabled = !isEditing;
            });
            
            const picWrapper = document.getElementById('profile-pic-wrapper');
            const btnSave = document.getElementById('btn-save-profile');
            const btnEdit = document.getElementById('btn-edit-profile');
            
            if (isEditing) {
                picWrapper.classList.remove('disabled');
                btnSave.classList.remove('hidden');
                btnEdit.classList.add('hidden');
            } else {
                picWrapper.classList.add('disabled');
                btnSave.classList.add('hidden');
                btnEdit.classList.remove('hidden');
            }
        }

        function enableProfileEdit() {
            setProfileState(true);
        }

        function saveDogProfile() {
            const imgElement = document.getElementById('dog-profile-pic');
            
            const profileData = {
                name: document.getElementById('dog-name').value,
                breed: document.getElementById('dog-breed').value,
                dob: document.getElementById('dog-dob').value,
                gender: document.getElementById('dog-gender').value,
                status: document.getElementById('dog-status').value,
                weight: document.getElementById('dog-weight').value,
                chip: document.getElementById('dog-chip').value,
                allergies: document.getElementById('dog-allergies').value,
                image: imgElement.src.startsWith('data:') ? imgElement.src : null 
            };

            localStorage.setItem('dogOpsProfile', JSON.stringify(profileData));
            
            setProfileState(false);
            alert("פרטי הכלב נשמרו בהצלחה!");
        }

        function loadDogProfile() {
            const savedData = localStorage.getItem('dogOpsProfile');
            if (savedData) {
                const profile = JSON.parse(savedData);
                document.getElementById('dog-name').value = profile.name || '';
                document.getElementById('dog-breed').value = profile.breed || '';
                document.getElementById('dog-dob').value = profile.dob || '';
                calculateDogAge();
                document.getElementById('dog-gender').value = profile.gender || 'זכר';
                document.getElementById('dog-status').value = profile.status || 'מסורס';
                document.getElementById('dog-weight').value = profile.weight || '';
                document.getElementById('dog-chip').value = profile.chip || '';
                document.getElementById('dog-allergies').value = profile.allergies || '';

                if (profile.image) {
                    const imgElement = document.getElementById('dog-profile-pic');
                    imgElement.src = profile.image;
                    imgElement.style.display = 'block';
                    document.getElementById('dog-pic-placeholder').style.display = 'none';
                }
                setProfileState(false);
            } else {
                setProfileState(true);
            }
        }

        // ==========================================
        // לוגיקת דיווחים מהירים (Quick Events)
        // ==========================================
        
        const DEFAULT_QUICK_EVENTS = [
            { text: "💩 עשה צרכים בחוץ", type: "good" },
            { text: "✨ הגיב יפה לפקודה 'אלי'", type: "good" },
            { text: "🐕 משך חזק ברצועה", type: "oops" },
            { text: "🗣️ נבח על כלב אחר", type: "oops" }
        ];

        function initQuickEvents() {
            let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents'));
            
            // תאימות לאחור: המרת נתונים ישנים מהגרסה הקודמת (מערך טקסט) למערך אובייקטים
            if (events && events.length > 0 && typeof events[0] === 'string') {
                events = events.map(text => {
                    let type = 'good'; 
                    // ניחוש חכם לסוג האירוע לפי הטקסט הישן
                    if (text.includes('משך') || text.includes('נבח') || text.includes('אופס') || text.includes('תקף')) type = 'oops';
                    return { text: text, type: type };
                });
                localStorage.setItem('dogOpsQuickEvents', JSON.stringify(events));
            }

            // טעינה ראשונית
            if (!events || events.length === 0) {
                localStorage.setItem('dogOpsQuickEvents', JSON.stringify(DEFAULT_QUICK_EVENTS));
            }
            renderQuickEventsDropdown();
        }

        function renderQuickEventsDropdown() {
            const select = document.getElementById('quick-events-select');
            select.innerHTML = '<option value="" disabled selected>⚡ דיווח מהיר (בחר מהרשימה...)</option>';
            
            let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents') || '[]');
            
            // מפריד לכלב טוב
            const hasGood = events.some(ev => ev.type === 'good');
            if (hasGood) {
                const divGood = document.createElement('option');
                divGood.disabled = true;
                divGood.text = "▬▬▬ 🟢 כלב טוב ▬▬▬";
                select.appendChild(divGood);
                
                events.forEach((ev, index) => {
                    if (ev.type === 'good') {
                        const opt = document.createElement('option');
                        opt.value = index; 
                        opt.text = ev.text;
                        select.appendChild(opt);
                    }
                });
            }

            // מפריד לאופס
            const hasOops = events.some(ev => ev.type === 'oops');
            if (hasOops) {
                const divOops = document.createElement('option');
                divOops.disabled = true;
                divOops.text = "▬▬▬ 🔴 אופס ▬▬▬";
                select.appendChild(divOops);
                
                events.forEach((ev, index) => {
                    if (ev.type === 'oops') {
                        const opt = document.createElement('option');
                        opt.value = index; 
                        opt.text = ev.text;
                        select.appendChild(opt);
                    }
                });
            }

            // מפריד לפעולות מערכת
            const divActions = document.createElement('option');
            divActions.disabled = true;
            divActions.text = "▬▬▬ 🛠️ פעולות ▬▬▬";
            select.appendChild(divActions);

            const addOpt = document.createElement('option');
            addOpt.value = "add_new";
            addOpt.text = "➕ הוסף אירוע מהיר לרשימה...";
            select.appendChild(addOpt);

            const manageOpt = document.createElement('option');
            manageOpt.value = "manage";
            manageOpt.text = "⚙️ נהל רשימה (ערוך/מחק)...";
            select.appendChild(manageOpt);
        }

        function handleQuickEventSelect() {
            const select = document.getElementById('quick-events-select');
            const value = select.value;
            const mainInput = document.getElementById('todo-input');

            document.getElementById('quick-event-inline-add').classList.add('hidden');
            document.getElementById('quick-event-manage-ui').classList.add('hidden');

            if (value === 'add_new') {
                document.getElementById('quick-event-inline-add').classList.remove('hidden');
                document.getElementById('new-quick-event-input').focus();
                select.selectedIndex = 0;
            } else if (value === 'manage') {
                renderManageEvents();
                document.getElementById('quick-event-manage-ui').classList.remove('hidden');
                select.selectedIndex = 0;
            } else if (value !== "") {
                let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents') || '[]');
                mainInput.value = events[value].text; 
                select.selectedIndex = 0;
            }
        }

        function saveInlineQuickEvent() {
            const input = document.getElementById('new-quick-event-input');
            const typeSelect = document.getElementById('new-quick-event-type');
            const text = input.value.trim();
            if (text) {
                let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents') || '[]');
                events.push({ text: "⭐ " + text, type: typeSelect.value });
                localStorage.setItem('dogOpsQuickEvents', JSON.stringify(events));
                renderQuickEventsDropdown();
                document.getElementById('todo-input').value = "⭐ " + text;
                input.value = "";
                document.getElementById('quick-event-inline-add').classList.add('hidden');
            }
        }

        function cancelInlineQuickEvent() {
            document.getElementById('new-quick-event-input').value = "";
            document.getElementById('quick-event-inline-add').classList.add('hidden');
        }

        function renderManageEvents() {
            const container = document.getElementById('manage-events-list');
            container.innerHTML = '';
            let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents') || '[]');
            
            events.forEach((ev, index) => {
                const row = document.createElement('div');
                row.className = 'manage-event-row';
                const safeText = ev.text.replace(/"/g, '&quot;');
                
                row.innerHTML = `
                    <select id="manage-type-${index}" class="quick-type-select">
                        <option value="good" ${ev.type === 'good' ? 'selected' : ''}>🟢</option>
                        <option value="oops" ${ev.type === 'oops' ? 'selected' : ''}>🔴</option>
                    </select>
                    <input type="text" id="manage-input-${index}" value="${safeText}">
                    <button class="save-btn" onclick="saveEditQuickEvent(${index})" title="שמור שינוי">💾</button>
                    <button class="delete-btn" onclick="deleteQuickEvent(${index})" title="מחק">🗑️</button>
                `;
                container.appendChild(row);
            });
        }

        function saveEditQuickEvent(index) {
            const newVal = document.getElementById(`manage-input-${index}`).value.trim();
            const newType = document.getElementById(`manage-type-${index}`).value;
            if (newVal) {
                let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents') || '[]');
                events[index] = { text: newVal, type: newType };
                localStorage.setItem('dogOpsQuickEvents', JSON.stringify(events));
                renderQuickEventsDropdown();
                renderManageEvents(); 
            }
        }

        function deleteQuickEvent(index) {
            if(confirm("למחוק דיווח זה מהרשימה?")) {
                let events = JSON.parse(localStorage.getItem('dogOpsQuickEvents') || '[]');
                events.splice(index, 1);
                localStorage.setItem('dogOpsQuickEvents', JSON.stringify(events));
                renderQuickEventsDropdown();
                renderManageEvents();
            }
        }

        function closeManageEvents() {
            document.getElementById('quick-event-manage-ui').classList.add('hidden');
        }
