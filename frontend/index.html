<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <h1>הרשימה שלי (DevOps Todo)</h1>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="הוסף משימה חדשה...">
            <button onclick="addTodo()">הוסף</button>
        </div>

        <ul id="todo-list">
            </ul>
    </div>

    <script>
        const API_URL = '/api/todos';

        async function fetchTodos() {
            try {
                const response = await fetch(API_URL);
                const todos = await response.json();
                const ul = document.getElementById('todo-list');
                ul.innerHTML = '';
                
                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${todo.title}</span>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">מחק</button>
                    `;
                    ul.appendChild(li);
                });
            } catch (error) {
                console.error('Error fetching todos:', error);
            }
        }

        async function addTodo() {
            const input = document.getElementById('todo-input');
            const title = input.value.trim();
            if (title === "") return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title })
                });
                if (response.ok) {
                    input.value = "";
                    fetchTodos();
                }
            } catch (error) {
                console.error('Error adding todo:', error);
            }
        }

        async function deleteTodo(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    fetchTodos();
                }
            } catch (error) {
                console.error('Error deleting todo:', error);
            }
        }

        window.onload = fetchTodos;
    </script>
</body>
</html>
