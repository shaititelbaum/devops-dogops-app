{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "frontend.fullname" . }}
  minReplicaCount: {{ .Values.keda.minReplicas }}
  maxReplicaCount: {{ .Values.keda.maxReplicas }}
  triggers:
    # Example: Scale up to 5 pods during work hours, scale down to 0 at night
    - type: cron
      metadata:
        timezone: Etc/UTC
        start: 0 8 * * *
        end: 0 0 * * *
        desiredReplicas: "3"
{{- end }}
