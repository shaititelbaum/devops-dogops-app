replicaCount: 1

image:
  repository: 480891637713.dkr.ecr.us-east-1.amazonaws.com/devops-dogops-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ecr-registry-secret

nameOverride: ""
fullnameOverride: "devops-dogops-frontend"

service:
  type: ClusterIP
  port: 80 

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: local.dogops.co # 👈 השתנה לכאן
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# --- יישור קו של בלוק ה-Autoscaling כדי למנוע נתקים בדיפלוימנט ---
# ==========================================
# 🚀 DEFAULT: STANDARD POD AUTOSCALING (HPA)
# ==========================================
# Native Kubernetes scaling based on CPU utilization.
# (Keep this as the primary active scaling strategy)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# ==========================================
# 🔌 OPTIONAL: EVENT-DRIVEN SCALING (KEDA)
# ==========================================
# "Toggle Switch" for Enterprise KEDA Scaling!
# When enabled, it replaces standard HPA with a ScaledObject that can
# scale all the way to ZERO when traffic dies, or pre-scale via Cron.
# To activate: Set keda.enabled=true and autoscaling.enabled=false.
keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 10

# ==========================================
# 🛑 SPOT INSTANCE SCHEDULING
# ==========================================
# This tells Kubernetes (and Karpenter) to prefer placing this application
# on heavily discounted Spot instances to save costs.
nodeSelector: {}

# --- הבלוקים החדשים שסוגרים את הנתקים ב-Templates ---
serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: true

httpRoute:
  enabled: false