replicaCount: 1

image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

persistence:
  enabled: true
  size: "2Gi"

auth:
  # נשתמש בפורמט גנרי שנתאים ב-GitOps
  existingSecret: "{{ .Values.databaseSecretName | default \"db-credentials\" }}"
  secretPasswordKey: "postgres-password" 
  usernameKey: "username"

extraEnvVars:
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: "{{ .Values.databaseSecretName | default \"db-credentials\" }}"
        key: username
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: "{{ .Values.databaseSecretName | default \"db-credentials\" }}"
        key: postgres-password

serviceAccount:
  create: true
  annotations: {}
  automount: true

# --- הבלוקים החדשים שסוגרים את כל הנתקים ב-Chart ---

service:
  type: ClusterIP
  port: 5432

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

ingress:
  enabled: false