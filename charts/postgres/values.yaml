replicaCount: 1

image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

persistence:
  enabled: true
  size: "2Gi"

auth:
  existingSecret: "test-db-credentials"
  # הוראה מפורשת ל-Chart להשתמש במפתחות שבנינו ב-ExternalSecret
  secretPasswordKey: "postgres-password" 
  usernameKey: "username"

# בונוס: דריסה מוחלטת דרך משתני סביבה כדי למנוע דריסת ברירת מחדל
extraEnvVars:
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: test-db-credentials
        key: username
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: test-db-credentials
        key: postgres-password

serviceAccount:
  create: true
  annotations: {}
  automount: true

# --- הבלוקים החדשים שסוגרים את כל הנתקים ב-Chart ---

service:
  type: ClusterIP
  port: 5432

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

ingress:
  enabled: false