apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-dogops-backend-chart.fullname" . }}
  labels:
    {{- include "devops-dogops-backend-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "devops-dogops-backend-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "devops-dogops-backend-chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "devops-dogops-backend-chart.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          
          # --- הרכבה דינמית ומאובטחת של ה-DATABASE_URL מתוך AWS Secrets Manager וקוברנטיס ---
          # --- הרכבה דינמית ומאובטחת של ה-DATABASE_URL מתוך AWS Secrets Manager וקוברנטיס ---
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  # 👇 התיקון: מקשיב ל-Values או משתמש בברירת מחדל
                  name: {{ .Values.existingSecretName | default "db-credentials" }}
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  # 👇 התיקון: מקשיב ל-Values או משתמש בברירת מחדל
                  name: {{ .Values.existingSecretName | default "db-credentials" }}
                  key: password
            - name: DB_HOST
              value: {{ printf "dogops-postgres-%s" .Release.Namespace }}
            - name: DB_NAME
              value: "dogops"
            - name: DATABASE_URL
              # 👇 התיקון הארכיטקטוני המדויק: הוספת הפרוטוקול ועטיפה תקינה בגרשיים
              value: "postgresql://$(DB_USER):$(DB_PASS)@$(DB_HOST):5432/$(DB_NAME)"
          # ----------------------------------------------------------------------------------

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}